<!DOCTYPE html>
<html>
<head>
    <title>Debug Chat Test</title>
    <style>
        body {
            font-family: Arial;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }
        .log {
            background: #222;
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #0099ff;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            font-size: 16px;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🔧 Debug Chat Test</h1>
    
    <h2>1. Test API Connection</h2>
    <button onclick="testAPI()">Test /character</button>
    
    <h2>2. Send Message</h2>
    <input type="text" id="message" placeholder="Enter message">
    <input type="text" id="charId" placeholder="Enter character ID">
    <button onclick="sendMessage()">Send Test Message</button>
    
    <h2>📋 Logs:</h2>
    <div id="logs"></div>

    <script>
        const API_URL = "http://localhost:5000";
        
        function log(msg) {
            console.log(msg);
            const logsDiv = document.getElementById("logs");
            logsDiv.innerHTML += `<div class="log">${msg}</div>`;
        }

        async function testAPI() {
            log("🔍 Testing /character endpoint...");
            try {
                const res = await fetch(`${API_URL}/character`);
                const data = await res.json();
                log(`✅ Got ${data.length} characters`);
                if (data[0]) {
                    log(`📌 First char: ${data[0].name} (ID: ${data[0].id})`);
                    document.getElementById("charId").value = data[0].id;
                }
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function sendMessage() {
            const message = document.getElementById("message").value;
            const charId = document.getElementById("charId").value;
            
            log(`📤 Sending: message="${message}", charId="${charId}"`);
            
            if (!message) {
                log("❌ Message is empty");
                return;
            }
            
            if (!charId) {
                log("❌ Character ID is empty");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, characterId: charId })
                });
                
                const data = await res.json();
                log(`📥 Status: ${res.status}`);
                log(`📥 Response: ${JSON.stringify(data)}`);
                
                if (data.reply) {
                    log(`🤖 AI Reply: ${data.reply}`);
                } else {
                    log("❌ No reply field in response");
                }
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        // Auto test on load
        window.onload = () => {
            log("✅ Page loaded. Click 'Test /character' first");
            testAPI();
        };
    </script>
</body>
</html>
